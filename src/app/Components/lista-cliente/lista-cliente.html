<div class="card">
  <div class="card-header d-flex" style ="background: rgb(67, 58, 58); color:white;">
   <span> Lista de Clientes</span>

   <button class="btn btn-primary ms-auto" (click)="ConsultarClientes()">Consultar</button>

  </div>
  <table class="table table-striped table-bordered" *ngIf="Lista && Lista.length > 0">
    <thead>
      <tr>
        <th scope="col">Numero</th>
        <th scope="col">Nombre</th>
        <th scope="col">Telefono</th>
        <th scope="col">Codigo Postal</th>
        <th scope="col">Direccion</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of Lista">
        <th scope="row">{{ c.numero }}</th>
        <td>{{ c.nombre }}</td>
        <td>{{ c.telefono }}</td>
        <td>{{ c.cp }}</td>
        <td>{{ c.direccion }}</td>
      </tr>
    </tbody>
  </table>
  </div>
